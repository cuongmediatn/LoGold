name: Update SJC gold price history

on:
  schedule:
    - cron: "0 23 * * *" # 06:00 giờ VN (UTC+7) hằng ngày
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cào dữ liệu
        run: python3 scripts/scrape_sjc_history.py

      - name: Commit & push nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sjc_history.json data/sjc_raw.jsonl
          git diff --cached --quiet || git commit -m "chore: update SJC gold price history"
          git push
