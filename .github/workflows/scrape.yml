name: Update gold price history

on:
  schedule:
    - cron: "0 23 * * *" # 06:00 giờ VN (UTC+7) hằng ngày
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cào SJC (+ ring_9999, jewelry — cùng nguồn)
        run: python3 scripts/scrape_sjc_history.py

      - name: Cào PNJ (+ pnj_24k — cùng nguồn)
        run: python3 scripts/scrape_pnj_history.py

      - name: Commit & push nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sjc_history.json ring_9999_history.json jewelry_history.json \
                  pnj_hanoi_history.json pnj_24k_history.json \
                  data/sjc_raw.jsonl data/pnj_raw.jsonl
          git diff --cached --quiet || git commit -m "chore: update gold price history"
          git push
